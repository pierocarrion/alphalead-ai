# Cloud Build job that runs Prisma migrations against Cloud SQL.
#
# Usage:
#   export PROJECT_ID=your-project-id
#   export REGION=us-central1
#   export DB_INSTANCE=motiva-db
#   export DB_SECRET=database-url
#
#   gcloud builds submit --config cloudbuild-migrate.yaml \
#     --substitutions=_REGION=$REGION,_DB_INSTANCE=$DB_INSTANCE,_DB_SECRET=$DB_SECRET

steps:
  # Run migrations using a single step that starts the Cloud SQL Auth Proxy
  # in the background, waits for it to be ready, then deploys Prisma migrations.
  - name: "node:20-alpine"
    entrypoint: sh
    args:
      - -c
      - |
        apk add --no-cache wget postgresql-client
        wget -q https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.0/cloud-sql-proxy.linux.amd64 -O /cloud-sql-proxy
        chmod +x /cloud-sql-proxy
        /cloud-sql-proxy --structured-logs --port=5432 "${PROJECT_ID}:${_REGION}:${_DB_INSTANCE}" &
        PROXY_PID=$!
        echo "Waiting for Cloud SQL proxy..."
        sleep 8
        npm ci --ignore-scripts
        npx prisma migrate deploy
        MIGRATE_STATUS=$?
        kill $$PROXY_PID || true
        exit $$MIGRATE_STATUS
    secretEnv: ["DATABASE_URL"]

availableSecrets:
  secretManager:
    - versionName: projects/${PROJECT_ID}/secrets/${_DB_SECRET}/versions/latest
      env: DATABASE_URL

substitutions:
  _REGION: us-central1
  _DB_INSTANCE: motiva-db
  _DB_SECRET: database-url

options:
  logging: CLOUD_LOGGING_ONLY
