name: Deploy to GCP

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-gcp-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/871583157548/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-cicd@alphalead-ai.iam.gserviceaccount.com
          project_id: alphalead-ai

      - uses: google-github-actions/setup-gcloud@v2

      - name: Upload source and submit build
        run: |
          set +e
          gcloud config set project alphalead-ai

          echo "=== Test 1: curl API direct ==="
          TOKEN=$(gcloud auth print-access-token)
          CURL_OUT=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST "https://cloudbuild.googleapis.com/v1/projects/alphalead-ai/builds" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"steps":[{"name":"busybox","args":["echo","hello from curl test"]}],"options":{"logging":"CLOUD_LOGGING_ONLY"}}' 2>&1)
          echo "$CURL_OUT"

          echo "=== Test 2: gcloud builds submit --no-source ==="
          NOSRC_OUT=$(gcloud builds submit --no-source --config=cloudbuild.yaml --project=alphalead-ai --substitutions=_VERSION=$GITHUB_SHA 2>&1)
          NOSRC_STATUS=$?
          echo "$NOSRC_OUT"
          if [ $NOSRC_STATUS -eq 0 ]; then
            echo "no-source build succeeded!"
            exit 0
          fi

          echo "=== Test 3: gsutil upload + positional source ==="
          tar -czf /tmp/source.tar.gz --exclude=.git --exclude=node_modules .
          gsutil cp /tmp/source.tar.gz gs://alphalead-ai-build-source/source-$GITHUB_SHA.tar.gz 2>&1
          OUTPUT=$(gcloud builds submit \
            gs://alphalead-ai-build-source/source-$GITHUB_SHA.tar.gz \
            --config=cloudbuild.yaml \
            --project=alphalead-ai \
            --substitutions=_VERSION=$GITHUB_SHA 2>&1)
          STATUS=$?
          echo "$OUTPUT"
          if [ $STATUS -ne 0 ]; then
            MSG=$(echo "$OUTPUT" | tail -10 | tr '\n' ' ' | sed 's/|/ /g')
            echo "::error::Build submit failed (exit $STATUS): $MSG"
            exit 1
          fi
